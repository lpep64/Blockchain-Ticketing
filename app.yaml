runtime: nodejs20
env: standard
instance_class: F2

handlers:
  - url: /
    static_files: vue-app/dist/index.html
    upload: vue-app/dist/index.html
  - url: /(.*)
    static_files: vue-app/dist/\1
    upload: vue-app/dist/(.*)
    mime_type: application/javascript
  - url: /api/generate-ticket
    script: auto
  - url: /api/transfer-ticket
    script: auto